name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Write service account key
        run: printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /home/runner/sa.json
      - name: Deploy hosting + Firestore rules
        run: npx --yes firebase-tools@latest deploy --only hosting,firestore:rules --project qs-workspace-5ddbd --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/sa.json
